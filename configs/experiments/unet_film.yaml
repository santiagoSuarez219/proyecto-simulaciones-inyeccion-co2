# Config de la variante unet_film (spec-002 Fase 3) — idéntica al baseline salvo
# model_variant y unet_depth. Autocontenida y reproducible.
data_root: data/processed
train_dir: train
val_dir: test
output_dir: ./output
checkpoint_dir: null
overfit_sample_idx: null
device: cuda
seed: 42
deterministic: false
experiment_name: unet_film
model_variant: unet_film
batch_size: 4
epochs: 100
lr: 0.0008
lr_scheduler: cosine
lr_min: 1.0e-06
weight_decay: 0.0001
num_workers: null
prefetch_factor: 2
persistent_workers: true
progress_interval: 10
grad_clip: 1.0
use_amp: false
time_steps: 61
hidden_dim: 64
spectral_modes: 16
dropout_p: 0.1
use_group_norm: false
unet_depth: 3
batch_size: 2
auto_resume: true
pause_hour: 7
early_stopping_patience: 5
early_stopping_min_delta: 0.0001
sf_weight: 2.5
vd_weight: 1.0
grad_weight: 0.8
seg_t0_weight: 3.0
seg_t1_20_weight: 2.0
seg_t21_60_weight: 1.0
save_epoch_pngs: false
epoch_png_examples: 1
uncertainty_passes: 30
uncertainty_eval_interval: 10
