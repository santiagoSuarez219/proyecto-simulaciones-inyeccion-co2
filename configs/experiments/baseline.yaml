# Config congelada de la línea base (spec-001 Fase 0/2) — copia exacta de los defaults
# de Config() al momento del tag `baseline-v1` (commit ce9cbfa). No editar para probar
# variantes: cada variante nueva es su propio archivo en configs/experiments/.
# data_root corregido a "data/processed" (bug encontrado 2026-07-14): los defaults de
# Config() usan data_root="." asumiendo train/test en la raíz del repo, pero los datos
# reales viven en data/processed/{train,test} (ver CLAUDE.md, comando de entrenamiento) —
# el valor con el que realmente se entrenó y congeló la seed 42 (ver
# outputs/baseline/seed_42/config.json). Con data_root="." este archivo nunca fue
# ejecutable tal cual.
data_root: data/processed
train_dir: train
val_dir: test
output_dir: ./output
checkpoint_dir: null
overfit_sample_idx: null
device: cuda
seed: 42
deterministic: false
experiment_name: baseline
model_variant: fno_baseline
batch_size: 4
epochs: 100
lr: 0.0008
lr_scheduler: cosine
lr_min: 1.0e-06
weight_decay: 0.0001
num_workers: null
prefetch_factor: 2
persistent_workers: true
progress_interval: 10
grad_clip: 1.0
use_amp: false
time_steps: 61
hidden_dim: 128
spectral_modes: 16
dropout_p: 0.1
use_group_norm: false
unet_depth: 3
attn_heads: 4
attn_num_blocks: 4
auto_resume: true
pause_hour: 7
early_stopping_patience: 5
early_stopping_min_delta: 0.0001
sf_weight: 2.5
vd_weight: 1.0
grad_weight: 0.8
seg_t0_weight: 3.0
seg_t1_20_weight: 2.0
seg_t21_60_weight: 1.0
save_epoch_pngs: false
epoch_png_examples: 1
uncertainty_passes: 30
uncertainty_eval_interval: 10
